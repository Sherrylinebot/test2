<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路行銷AI協作專員 | 郭宥瑄</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; text-align: left; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .gradient-text { background: linear-gradient(to right, #f97316, #e11d48, #4f46e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [keyword, setKeyword] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [showResult, setShowResult] = useState(false);

            useEffect(() => {
                window.addEventListener('scroll', () => setScrolled(window.scrollY > 50));
                if (window.lucide) window.lucide.createIcons();
            }, []);

            const handleGenerate = () => {
                if (!keyword) return;
                setIsGenerating(true);
                setTimeout(() => { setIsGenerating(false); setShowResult(true); }, 1500);
            };

            return (
                <div className="min-h-screen bg-[#fcfcfd] text-slate-900 overflow-x-hidden text-left">
                    <nav className={`fixed top-0 w-full z-50 transition-all p-6 ${scrolled ? 'bg-white/90 shadow-xl' : 'bg-transparent'}`}>
                        <div className="max-w-7xl mx-auto flex justify-between items-center"><div className="font-black bg-slate-900 text-white px-4 py-2 rounded-xl text-sm">網路行銷AI協作專員 郭宥瑄</div></div>
                    </nav>
                    <section className="pt-48 pb-20 px-6 max-w-7xl mx-auto">
                        <h1 className="text-6xl md:text-8xl font-black tracking-tighter leading-tight animate-float">我不只是<br/><span className="gradient-text italic">工具使用者</span></h1>
                        <p className="mt-10 text-2xl text-slate-500 max-w-3xl font-medium border-l-4 border-slate-900 pl-8">具備將「科學傳播」背景轉譯為「高品質內容」的敏銳度。專注於將 AI 浪潮轉化為您的商業優勢。</p>
                    </section>

                    <section className="py-20 bg-slate-50 px-6">
                        <div className="max-w-4xl mx-auto bg-white p-12 rounded-[4rem] shadow-2xl border border-white">
                            <h2 className="text-3xl font-black mb-8 flex items-center gap-3"><Icon name="cpu" className="text-orange-500" /> AI 實驗室：SEO 策略分析</h2>
                            <div className="flex flex-col md:flex-row gap-4 mb-8">
                                <input className="flex-1 bg-slate-50 border-2 border-slate-100 rounded-3xl px-8 py-4 text-xl font-bold focus:border-orange-500 outline-none" placeholder="輸入目標關鍵字..." value={keyword} onChange={(e)=>setKeyword(e.target.value)} />
                                <button onClick={handleGenerate} className="bg-slate-900 text-white px-10 rounded-3xl font-black hover:bg-orange-500 transition-all">{isGenerating ? "分析中..." : "執行"}</button>
                            </div>
                            <a href="https://gemini.google.com/share/09adc3344186" target="_blank" className="text-slate-400 hover:text-orange-600 font-bold text-sm">查看文案生成器：揭秘如何將『傳播原理』轉化為 AI 指令 →</a>
                            {showResult && (
                                <div className="mt-10 p-8 bg-emerald-50 border border-emerald-100 rounded-[2.5rem] animate-pulse"><div className="font-black text-emerald-600 mb-2 text-xl">分析完成</div><div className="text-2xl font-extrabold text-slate-800 leading-tight">2026 {keyword} 全攻略：從策略佈局到 AI 實踐的關鍵解答</div></div>
                            )}
                        </div>
                    </section>

                    <section className="py-32 px-6 max-w-7xl mx-auto">
                        <h2 className="text-5xl md:text-8xl font-black mb-20 tracking-tighter">實戰案例展示</h2>
                        <div className="bg-white p-12 rounded-[4rem] shadow-2xl border border-white mb-12">
                            <div className="flex justify-between items-start mb-8">
                                <h3 className="text-3xl font-black text-slate-800">數位內容品牌經營 | YouTube 內容行銷</h3>
                                <a href="https://www.youtube.com/@iqma5845" target="_blank" className="bg-red-600 text-white px-8 py-3 rounded-2xl font-black flex items-center gap-2 hover:scale-110 transition-all shadow-lg"><Icon name="youtube" /> 查看 YT 成果</a>
                            </div>
                            <p className="text-2xl text-slate-500 italic mb-10">「獨立負責市場分析、內容策略到全端後製。頻道累計觀看突破 100,000 次。」</p>
                        </div>
                    </section>

                    <footer className="py-32 px-6 bg-white border-t border-slate-100 text-center">
                        <h3 className="text-4xl md:text-7xl font-black mb-8 leading-tight">期待能與貴團隊<br/><span className="gradient-text italic">並肩作戰</span></h3>
                        <p className="text-xl md:text-2xl text-slate-400 font-medium leading-relaxed italic mb-20 max-w-4xl mx-auto">「我認為 AI 的核心價值在於釋放人類的創造力。在未來的合作中，我希望能將我在視覺產製、實體課程企劃與 YouTube 獲客經營的實戰經驗，轉化為貴團隊穩定的動力。我已準備好與您一同突破下一個目標。」</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mb-20 text-left max-w-5xl mx-auto">
                            <a href="https://www.youtube.com/@iqma5845" target="_blank" className="flex items-center gap-6 p-8 bg-slate-50 rounded-[3rem] hover:bg-red-50 transition-all group border border-transparent hover:border-red-100">
                                <div className="w-16 h-16 bg-white rounded-2xl shadow-lg flex items-center justify-center text-slate-300 group-hover:text-red-600"><Icon name="youtube" size={32} /></div>
                                <div><span className="block text-xs font-black text-slate-400 uppercase mb-1">YouTube 頻道</span><span className="block text-2xl font-black text-slate-800 group-hover:text-red-600">歡迎按讚訂閱分享</span></div>
                            </a>
                            <a href="mailto:ysnewmedia@gmail.com" className="flex items-center gap-6 p-8 bg-slate-50 rounded-[3rem] hover:bg-orange-50 transition-all group border border-transparent hover:border-orange-100">
                                <div className="w-16 h-16 bg-white rounded-2xl shadow-lg flex items-center justify-center text-slate-300 group-hover:text-orange-500"><Icon name="mail" size={32} /></div>
                                <div><span className="block text-xs font-black text-slate-400 uppercase mb-1">聯絡信箱</span><span className="block text-2xl font-black text-slate-800 underline decoration-orange-200 decoration-4">ysnewmedia@gmail.com</span></div>
                            </a>
                        </div>
                        <p className="text-slate-300 font-bold tracking-[0.5em] text-xs uppercase">數據驅動 • AI 協作 • © 2026 郭宥瑄</p>
                    </footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
